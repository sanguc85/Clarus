<div class="choice">
    <table>
        <tr>
            <td class="label">Metadata Table</td>
        </tr>
        <tr>
            <select #select [(ngModel)]="referenceTable" (ngModelChange)="loadReferenceTableData()"
                class="entity-igx-select" required>
                <option *ngFor="let table of metaDataTables" [value]="table">
                    {{ table }}
                </option>
            </select>
        </tr>
    </table>
    <div align="center" class="type" grid-header="referenceTable">{{ referenceTable }}
        <button mat-raised-button class="custombtn saveBtn usa-button" id="btnSaveData" aria-label="Save Data"
            (click)="onSaveData()" [disabled]="!metaDataService.isMO">Save
            Data</button> &nbsp; &nbsp;
    </div>
</div>

<div class="grid-container">
  <igx-grid #grid
            [data]="gridData"
            [primaryKey]="'Id'"
            [rowEditable]="metaDataService.isMO"
            [width]="'100%'" [height]="'650px'" [rowHeight]="'20px'"
            (cellEdit)="handleCellEdit($event)"
            (rowDelete)="handleRowDelete($event)"
            (rowDeleted)="handleRowDeleted($event)"
            (rowAdded)="handleRowAdded($event)">

    <!-- Common -->
    <igx-column field="Id" header="Id" [editable]="false"></igx-column>

    <!-- Name / Position (hide on Account; show as Name for generic; show as Position for Position) -->
    <igx-column field="Name"
                [header]="isPosition ? 'Position' : 'Name'"
                [hidden]="isAccount">
    </igx-column>

    <!-- Description (hide for Account and Position) -->
    <igx-column field="Description" header="Description"
                [hidden]="isAccount || isPosition">
    </igx-column>

    <!-- Account-only columns -->
    <igx-column field="Entity" header="Entity" [editable]="true" [hidden]="!isAccount">
      <ng-template igxCellEditor let-cell="cell">
        <igx-select
          [ngModel]="cell.value"
          (ngModelChange)="cell.update($event); onCellValueChange($event, cell, 'Entity')">
          <igx-select-item *ngFor="let e of entityOptions" [value]="e">{{ e }}</igx-select-item>
        </igx-select>
      </ng-template>
    </igx-column>

    <igx-column field="Number" header="Account no" [editable]="true" [hidden]="!isAccount"></igx-column>
    <igx-column field="Description" header="Account Description" [editable]="true" [hidden]="!isAccount"></igx-column>

    <igx-column field="Position" header="Position" [editable]="true" [hidden]="!isAccount">
      <ng-template igxCellEditor let-cell="cell">
        <igx-select
          [ngModel]="cell.value"
          (ngModelChange)="onCellValueChange($event, cell, 'Position')">
          <igx-select-item *ngFor="let p of positionOptions" [value]="p">{{ p }}</igx-select-item>
        </igx-select>
      </ng-template>
    </igx-column>

    <!-- Boolean columns: show on Account and Position -->
    <igx-column field="IsActive" header="Status" dataType="boolean" [editable]="true"
                [hidden]="!(isAccount || isPosition)">
      <ng-template igxCell let-value>
        <igx-checkbox [checked]="value" disabled></igx-checkbox>
      </ng-template>
      <ng-template igxCellEditor let-cell="cell">
        <igx-checkbox
          [ngModel]="cell.value"
          (ngModelChange)="cell.update($event); onCellValueChange($event, cell, 'IsActive')">
        </igx-checkbox>
      </ng-template>
    </igx-column>

    <igx-column field="IsDefault" header="IsDefault" dataType="boolean" [editable]="true"
                [hidden]="!isAccount">
      <ng-template igxCell let-value>
        <igx-checkbox [checked]="value" disabled></igx-checkbox>
      </ng-template>
      <ng-template igxCellEditor let-cell="cell">
        <igx-checkbox
          [ngModel]="cell.value"
          (ngModelChange)="cell.update($event); onCellValueChange($event, cell, 'IsDefault')">
        </igx-checkbox>
      </ng-template>
    </igx-column>

    <igx-action-strip #actionstrip *ngIf="metaDataService.isMO">
      <igx-grid-editing-actions [addRow]="true"></igx-grid-editing-actions>
    </igx-action-strip>
  </igx-grid>
</div>
