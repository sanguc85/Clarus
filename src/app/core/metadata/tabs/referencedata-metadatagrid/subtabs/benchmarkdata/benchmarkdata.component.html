<button mat-raised-button class="custombtn btnExportData usa-button" id="Export Data" aria-label="Export Data"
    (click)="exportToExcel()">Export To Excel</button>

        <div class="row">
            <div class="col-lg-2 col-md-2 col-sm-2 firstDiv">
                <label>Start Date</label>
                <igx-date-picker class="datePicker" [(ngModel)]="startDate" [maxValue]="endDate" #defaultDate mode="dropdown"
                    inputFormat="yyyy-MM-dd">
                </igx-date-picker>
            </div>
            <div class="col-lg-2 col-md-2 col-sm-2 firstDiv">
                <label>End Date</label>
                <igx-date-picker class="datePicker" [(ngModel)]="endDate" #defaultDate mode="dropdown" inputFormat="yyyy-MM-dd">
                </igx-date-picker>
            </div>
            <div class="col-lg-4 col-md-3 col-sm-3">
                <button mat-raised-button class="custombtn usa-button" id="btnPullData" aria-label="Pull Data"
                    (click)="getBenchmarkData()">
                    Pull Data
                </button>
                &nbsp; &nbsp;
                <button mat-raised-button class="custombtn usa-button" id="btnSaveData" aria-label="Save Data"
                    (click)="openBaseRateDialog()" [disabled]="!metaDataService.isAdmin">Add Base Rate</button>
            </div>
        </div>

    <div class="grid-container">
        <igx-grid #benchMarkData [data]="benchmarkData" [width]="'100%'" [height]="'700px'" [rowHeight]="'20px'">
            <igx-paginator [perPage]="25">
                <igx-paginator-content>
                    <igx-page-size></igx-page-size>
                    <div>Total Items:<span class="spanTotalRecords"> {{ benchmarkData.length }}</span></div>
                    <igx-page-nav></igx-page-nav>
                </igx-paginator-content>
            </igx-paginator>

            <igx-column field="Date" header="Date" [dataType]="'date'" [pipeArgs]="datePipeArgs"></igx-column>
            <igx-column field="FedFunds" header="Fed Funds" [sortable]="true" [filterable]="true"></igx-column>
            <igx-column field="Libor" header="LIBOR" [sortable]="true" [filterable]="true"></igx-column>
        </igx-grid>
    </div>

<igx-dialog #addBaseRateDialog [closeOnOutsideSelect]="false">
    <div>
        <div class="title-bar">
            <h2 class="title">Add Base Rate</h2>
            <a class="close-button" (click)="closeBaseRateDialog()" title="Close" aria-label="Close">&#10006;</a>
        </div>
        <div class="container" style="width: 500px">
            <div class="formbox" [formGroup]="newBaseRateForm">
                <table class="table table-striped table-hover" style="margin-top: 20px">
                    <tr>
                        <td>Date</td>
                        <td>
                            <igx-date-picker class="datePickerDialog" formControlName="DataDate" required #defaultDate mode="dropdown"
                                    inputFormat="yyyy-MM-dd">
                            </igx-date-picker>
                            <div *ngIf="newBaseRateForm.get('DataDate').hasError('required') && newBaseRateForm.get('DataDate').touched"
                                class="error-message">
                                Date is required
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>Rate Type</td>
                        <td>
                            <select formControlName="RateType" class="form-control usa-input" required
                                [ngClass]="'custom-igx-select'">
                                <option *ngFor="let item of rateList" [value]="item">{{ item }}
                                </option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Rate</td>
                        <td>
                            <input type="number" class="form-control usa-input" formControlName="Rate" required />
                            <div *ngIf="newBaseRateForm.get('Rate').hasError('required') && newBaseRateForm.get('Rate').touched"
                                class="error-message">
                                Rate is required
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="button-row">
            <button mat-raised-button class="custombtn usa-button" aria-label="SaveSecurityPrice" title="Save Security Price"
                id="btnSave" [disabled]="newBaseRateForm.invalid" (click)="saveNewBaseRate()">
                Save
            </button>
            <button mat-raised-button class="custombtn usa-button" (click)="closeBaseRateDialog()">
                Cancel
            </button>
            &nbsp; &nbsp;
        </div>
    </div>
</igx-dialog>
